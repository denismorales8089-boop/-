<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pregunta</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

h1{
margin-bottom:60px;
}

#si{
position:absolute;
right:80px;
font-size:22px;
padding:15px 40px;
background:#ff2d55;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

#no{
position:absolute;
left:80px;
font-size:30px;
padding:25px 70px;
background:#555;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.corazon{
position:fixed;
color:red;
font-size:25px;
animation:flotar 3s linear infinite;
}

@keyframes flotar{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

</style>
</head>

<body>

<h1>¿Quieres ir al cine conmigo? 🍿🎬</h1>

<button id="no">NO</button>
<button id="si">SÍ</button>

<script>

const botonNo = document.getElementById("no");

botonNo.addEventListener("mouseover", mover);
botonNo.addEventListener("click", mover);

function mover(){

let x = Math.random() * (window.innerWidth - 200);
let y = Math.random() * (window.innerHeight - 100);

botonNo.style.left = x + "px";
botonNo.style.top = y + "px";

}

document.getElementById("si").onclick = function(){

document.body.innerHTML = `
<div style="
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
background:black;
color:white;
font-size:60px;
text-align:center;
">
<div>Ya sabía que sí ibas a querer jijiji 😏</div>
</div>
`;

crearCorazones();

}

function crearCorazones(){

setInterval(() => {

let corazon = document.createElement("div");
corazon.className="corazon";
corazon.innerHTML="❤️";

corazon.style.left = Math.random()*100+"vw";
corazon.style.bottom="0";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},3000);

},200);

}

</script>

</body>
</html>
